<main [class.main-focus]="focusMode()" class="h-screen w-screen flex flex-col text-white main">
  <app-top-row></app-top-row>

  <div class="flex-1 flex items-center justify-center">
    @if (focusMode()) {
      <app-active-focus></app-active-focus>
    } @else {
      <app-center></app-center>
    }
  </div>
  <div class="flex w-screen p-4">
    <div class="flex-1 ">Bottom row left</div>
    <div class="flex-1 flex items-center justify-end ">
      Bottom row right
    </div>
  </div>
</main>
