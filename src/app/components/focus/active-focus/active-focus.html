<div [attr.aria-valuenow]="progress()" [attr.style]="'--value:' + progress() + '; --size:40rem; --thickness: 6px;'"
     class="radial-progress" role="progressbar">
  <div>
    <div class="flex flex-col justify-center items-center h-full">
      <span class="w-[320px] text-[120px] font-semibold text-center inline-block">
  {{ minutes() + ':' + seconds() }}
      </span>


      <input class="input input-ghost text-4xl text-center" placeholder="I will focus on..." type="text"/>
    </div>
  </div>
</div>
