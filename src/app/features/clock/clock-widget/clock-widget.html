<span class="countdown text-[clamp(4.5rem,11vw,9.5rem)] font-semibold leading-none">
  <span [attr.style]="'--value:' + hours()" aria-label="{{ hours() }}" aria-live="polite"></span>
  :
  <span
    [attr.style]="'--value:' + minutes() + '; --digits: 2;'"
    aria-label="{{ minutes() }}"
    aria-live="polite"
  ></span>
</span>
