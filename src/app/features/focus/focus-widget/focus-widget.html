<button
  type="button"
  class="glass-card flex min-w-14 flex-col items-center p-1.5 text-xs"
  [class.is-active]="status() !== 'idle'"
  (click)="handleClick()"
>
  <i
    class="fa-lightbulb text-2xl"
    [class.fa-regular]="status() === 'idle'"
    [class.fa-solid]="status() !== 'idle'"
  ></i>
  <span>{{ label() }}</span>
</button>
