<button
  class="glass-card flex min-w-16 flex-col items-center p-1.5 text-xs"
  popovertarget="move-popover"
  style="anchor-name: --anchor-1"
  [class.animate-pulse]="isAwaitingAck()"
  [class.is-active]="isActive()"
>
  <i
    class="fa-solid text-2xl"
    [class.fa-person]="phase() === 'sitting'"
    [class.fa-person-walking]="phase() === 'standing'"
  ></i>

  <span>{{ label() }}</span>
</button>
<div
  class="dropdown menu w-52 rounded-box bg-base-100 shadow-sm"
  popover
  id="move-popover"
  style="position-anchor: --anchor-1"
>
  <div class="px-2 py-1 text-sm opacity-70">
    {{ phase() === 'sitting' ? 'Sitting phase' : 'Standing phase' }}
  </div>
  <progress class="progress progress-primary mb-2" max="100" [value]="progress()"></progress>
  <button type="button" class="btn btn-soft btn-sm btn-wide" (click)="primaryAction()">
    {{ actionLabel() }}
  </button>
  @if (status() !== 'idle') {
    <button type="button" class="btn btn-ghost btn-sm btn-wide mt-2" (click)="resetSession()">
      Reset
    </button>
  }
</div>
