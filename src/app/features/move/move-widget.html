<button
  class="glass-card flex flex-col p-2 items-center" popovertarget="move-popover" style="anchor-name:--anchor-1"
  [class.animate-pulse]="awaitingAck()"
>
  <i
    class="fa-solid text-[28px]"
    [class.fa-person-drowning]="isSitdown()"
    [class.fa-person-walking]="!isSitdown()"
  ></i>

  @if (countdownSeconds() > 0) {
    <span>{{  hoursLeft() + 'h ' + minutesLeftPadded() + 'm'  }}</span>
  } @else {
    <span>Move</span>
  }
</button>
<div class="dropdown menu w-52 rounded-box bg-base-100 shadow-sm"
    popover id="move-popover" style="position-anchor:--anchor-1">
  <button type="button" class="btn btn-soft btn-sm btn-wide" (click)="isRunning() ? stopMoveTimer() : startMoveTimer()">{{isRunning() ? 'Stop timer' : 'Start timer'}}</button>

</div>
